{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Веб-тренажёр обратной связи{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body class="bg-body-tertiary">
<header class="border-bottom bg-white">
    <nav class="navbar navbar-expand-lg container py-3">
        <a class="navbar-brand fw-semibold" href="{% url 'core:home' %}">Тренажёр обратной связи</a>
        <div class="d-flex gap-2 flex-wrap">
            <a class="btn btn-outline-secondary btn-sm" href="{% url 'content:game-list' %}">Игры</a>
            <a class="btn btn-outline-secondary btn-sm" href="{% url 'accounts:login' %}">Вход</a>
            <a class="btn btn-outline-secondary btn-sm" href="{% url 'adminpanel:dashboard' %}">Backoffice</a>
        </div>
    </nav>
</header>
<main class="container py-4 py-md-5">
    {% block content %}{% endblock %}
</main>
</body>
</html>
